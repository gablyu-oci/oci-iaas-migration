AWSTemplateFormatVersion: '2010-09-09'
Description: 'Nested stacks example - Master stack deploying VPC, RDS, and Application tiers'

Parameters:
  Environment:
    Type: String
    Default: 'production'
    AllowedValues:
      - 'development'
      - 'staging'
      - 'production'
  
  TemplatesBucketName:
    Type: String
    Description: 'S3 bucket containing nested stack templates'
    Default: 'my-cloudformation-templates'
  
  DBPassword:
    Type: String
    NoEcho: true
    Description: 'Database master password'
    MinLength: 8

Conditions:
  IsProduction: !Equals [!Ref Environment, 'production']

Resources:
  # VPC Stack
  VPCStack:
    Type: 'AWS::CloudFormation::Stack'
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/vpc-template.yaml'
      Parameters:
        Environment: !Ref Environment
        VpcCIDR: !If [IsProduction, '10.0.0.0/16', '10.1.0.0/16']
        PublicSubnet1CIDR: !If [IsProduction, '10.0.1.0/24', '10.1.1.0/24']
        PublicSubnet2CIDR: !If [IsProduction, '10.0.2.0/24', '10.1.2.0/24']
        PrivateSubnet1CIDR: !If [IsProduction, '10.0.10.0/24', '10.1.10.0/24']
        PrivateSubnet2CIDR: !If [IsProduction, '10.0.20.0/24', '10.1.20.0/24']
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'
        - Key: Environment
          Value: !Ref Environment
      TimeoutInMinutes: 30

  # Security Groups Stack
  SecurityStack:
    Type: 'AWS::CloudFormation::Stack'
    DependsOn: VPCStack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/security-groups.yaml'
      Parameters:
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        Environment: !Ref Environment
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-security'
      TimeoutInMinutes: 10

  # Database Stack (RDS)
  DatabaseStack:
    Type: 'AWS::CloudFormation::Stack'
    DependsOn: SecurityStack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/rds-postgres.yaml'
      Parameters:
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PrivateSubnet1: !GetAtt VPCStack.Outputs.PrivateSubnet1
        PrivateSubnet2: !GetAtt VPCStack.Outputs.PrivateSubnet2
        DBSecurityGroup: !GetAtt SecurityStack.Outputs.DatabaseSecurityGroup
        DBInstanceClass: !If [IsProduction, 'db.r5.large', 'db.t3.medium']
        DBName: 'appdb'
        DBMasterUsername: 'dbadmin'
        DBMasterPassword: !Ref DBPassword
        MultiAZ: !If [IsProduction, 'true', 'false']
        BackupRetentionPeriod: !If [IsProduction, 30, 7]
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-database'
        - Key: Environment
          Value: !Ref Environment
      TimeoutInMinutes: 45

  # Application Stack (ECS/Fargate)
  ApplicationStack:
    Type: 'AWS::CloudFormation::Stack'
    DependsOn:
      - VPCStack
      - SecurityStack
      - DatabaseStack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/ecs-fargate.yaml'
      Parameters:
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PublicSubnets: !GetAtt VPCStack.Outputs.PublicSubnets
        PrivateSubnets: !GetAtt VPCStack.Outputs.PrivateSubnets
        AppSecurityGroup: !GetAtt SecurityStack.Outputs.ApplicationSecurityGroup
        DatabaseEndpoint: !GetAtt DatabaseStack.Outputs.DatabaseEndpoint
        DatabaseName: !GetAtt DatabaseStack.Outputs.DatabaseName
        DesiredCount: !If [IsProduction, 4, 2]
        MaxCount: !If [IsProduction, 20, 5]
        ContainerCpu: !If [IsProduction, '1024', '512']
        ContainerMemory: !If [IsProduction, '2048', '1024']
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-application'
        - Key: Environment
          Value: !Ref Environment
      TimeoutInMinutes: 30

  # Cache Stack (ElastiCache Redis)
  CacheStack:
    Type: 'AWS::CloudFormation::Stack'
    Condition: IsProduction
    DependsOn:
      - VPCStack
      - SecurityStack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/elasticache-redis.yaml'
      Parameters:
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PrivateSubnet1: !GetAtt VPCStack.Outputs.PrivateSubnet1
        PrivateSubnet2: !GetAtt VPCStack.Outputs.PrivateSubnet2
        CacheSecurityGroup: !GetAtt SecurityStack.Outputs.CacheSecurityGroup
        NodeType: 'cache.r5.large'
        NumCacheNodes: 2
        AutomaticFailoverEnabled: 'true'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-cache'
        - Key: Environment
          Value: !Ref Environment
      TimeoutInMinutes: 30

  # Monitoring Stack
  MonitoringStack:
    Type: 'AWS::CloudFormation::Stack'
    DependsOn:
      - ApplicationStack
      - DatabaseStack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/cloudwatch-monitoring.yaml'
      Parameters:
        ApplicationName: !Ref 'AWS::StackName'
        AlarmEmail: !Sub 'alerts-${Environment}@example.com'
        ClusterName: !GetAtt ApplicationStack.Outputs.ClusterName
        ServiceName: !GetAtt ApplicationStack.Outputs.ServiceName
        DatabaseInstance: !GetAtt DatabaseStack.Outputs.DatabaseInstanceId
        LoadBalancerFullName: !GetAtt ApplicationStack.Outputs.LoadBalancerFullName
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-monitoring'
      TimeoutInMinutes: 15

  # WAF Stack (Production only)
  WAFStack:
    Type: 'AWS::CloudFormation::Stack'
    Condition: IsProduction
    DependsOn: ApplicationStack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/waf-rules.yaml'
      Parameters:
        LoadBalancerArn: !GetAtt ApplicationStack.Outputs.LoadBalancerArn
        RateLimitPerIP: 2000
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-waf'
      TimeoutInMinutes: 10

Outputs:
  VpcId:
    Description: 'VPC ID'
    Value: !GetAtt VPCStack.Outputs.VpcId
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'
  
  ApplicationURL:
    Description: 'Application URL'
    Value: !GetAtt ApplicationStack.Outputs.ServiceURL
    Export:
      Name: !Sub '${AWS::StackName}-ApplicationURL'
  
  DatabaseEndpoint:
    Description: 'Database endpoint'
    Value: !GetAtt DatabaseStack.Outputs.DatabaseEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-DatabaseEndpoint'
  
  CacheEndpoint:
    Condition: IsProduction
    Description: 'Cache cluster endpoint'
    Value: !GetAtt CacheStack.Outputs.CacheEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-CacheEndpoint'
  
  MonitoringDashboard:
    Description: 'CloudWatch Dashboard URL'
    Value: !GetAtt MonitoringStack.Outputs.DashboardURL
