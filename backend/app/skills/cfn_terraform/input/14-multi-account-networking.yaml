AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Enterprise multi-account networking: Transit Gateway hub, multiple VPCs,
  VPN connection to on-premises, VPC peering, shared services VPC,
  Route53 private hosted zones, and VPC Flow Logs.
  Common pattern for enterprise network architecture migrations.

Parameters:
  OrganizationCIDR:
    Type: String
    Default: "10.0.0.0/8"
    Description: Supernet CIDR for all VPCs
  SharedServicesCIDR:
    Type: String
    Default: "10.0.0.0/16"
  ProductionCIDR:
    Type: String
    Default: "10.1.0.0/16"
  DevelopmentCIDR:
    Type: String
    Default: "10.2.0.0/16"
  OnPremisesCIDR:
    Type: String
    Default: "172.16.0.0/12"
  VPNCustomerGatewayIP:
    Type: String
    Default: "203.0.113.1"
    Description: Public IP of on-premises VPN device
  VPNPreSharedKey:
    Type: String
    NoEcho: true
    Default: "REPLACE_WITH_REAL_PSK"
  FlowLogRetentionDays:
    Type: Number
    Default: 90

Resources:

  # =========================================
  # Transit Gateway (Hub)
  # =========================================
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      Description: Central hub for all VPC connectivity
      AmazonSideAsn: 64512
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      DnsSupport: enable
      VpnEcmpSupport: enable
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-tgw"

  # =========================================
  # Shared Services VPC
  # =========================================
  SharedServicesVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref SharedServicesCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-shared-services"

  SharedServicesSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SharedServicesVPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-shared-a"

  SharedServicesSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SharedServicesVPC
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-shared-b"

  SharedServicesIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-shared-igw"

  SharedServicesIGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref SharedServicesVPC
      InternetGatewayId: !Ref SharedServicesIGW

  SharedServicesRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SharedServicesVPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-shared-rt"

  SharedServicesDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: SharedServicesIGWAttachment
    Properties:
      RouteTableId: !Ref SharedServicesRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref SharedServicesIGW

  SharedServicesTGWRoute:
    Type: AWS::EC2::Route
    DependsOn: SharedServicesTGWAttachment
    Properties:
      RouteTableId: !Ref SharedServicesRouteTable
      DestinationCidrBlock: !Ref OrganizationCIDR
      TransitGatewayId: !Ref TransitGateway

  SharedServicesOnPremRoute:
    Type: AWS::EC2::Route
    DependsOn: SharedServicesTGWAttachment
    Properties:
      RouteTableId: !Ref SharedServicesRouteTable
      DestinationCidrBlock: !Ref OnPremisesCIDR
      TransitGatewayId: !Ref TransitGateway

  SharedServicesSubnetAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SharedServicesSubnetA
      RouteTableId: !Ref SharedServicesRouteTable

  SharedServicesSubnetBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SharedServicesSubnetB
      RouteTableId: !Ref SharedServicesRouteTable

  SharedServicesTGWAttachment:
    Type: AWS::EC2::TransitGatewayAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !Ref SharedServicesVPC
      SubnetIds:
        - !Ref SharedServicesSubnetA
        - !Ref SharedServicesSubnetB
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-shared-tgw-attach"

  # =========================================
  # Production VPC
  # =========================================
  ProductionVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref ProductionCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-production"

  ProdPrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProductionVPC
      CidrBlock: "10.1.1.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-prod-private-a"

  ProdPrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProductionVPC
      CidrBlock: "10.1.2.0/24"
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-prod-private-b"

  ProdPublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProductionVPC
      CidrBlock: "10.1.10.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-prod-public-a"

  ProdRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ProductionVPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-prod-rt"

  ProdTGWRoute:
    Type: AWS::EC2::Route
    DependsOn: ProductionTGWAttachment
    Properties:
      RouteTableId: !Ref ProdRouteTable
      DestinationCidrBlock: !Ref OrganizationCIDR
      TransitGatewayId: !Ref TransitGateway

  ProdOnPremRoute:
    Type: AWS::EC2::Route
    DependsOn: ProductionTGWAttachment
    Properties:
      RouteTableId: !Ref ProdRouteTable
      DestinationCidrBlock: !Ref OnPremisesCIDR
      TransitGatewayId: !Ref TransitGateway

  ProdSubnetAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref ProdPrivateSubnetA
      RouteTableId: !Ref ProdRouteTable

  ProdSubnetBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref ProdPrivateSubnetB
      RouteTableId: !Ref ProdRouteTable

  ProductionTGWAttachment:
    Type: AWS::EC2::TransitGatewayAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !Ref ProductionVPC
      SubnetIds:
        - !Ref ProdPrivateSubnetA
        - !Ref ProdPrivateSubnetB
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-prod-tgw-attach"

  # =========================================
  # Development VPC
  # =========================================
  DevelopmentVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref DevelopmentCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-development"

  DevSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DevelopmentVPC
      CidrBlock: "10.2.1.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-dev-a"

  DevSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DevelopmentVPC
      CidrBlock: "10.2.2.0/24"
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-dev-b"

  DevRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DevelopmentVPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-dev-rt"

  DevTGWRoute:
    Type: AWS::EC2::Route
    DependsOn: DevelopmentTGWAttachment
    Properties:
      RouteTableId: !Ref DevRouteTable
      DestinationCidrBlock: !Ref OrganizationCIDR
      TransitGatewayId: !Ref TransitGateway

  DevSubnetAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DevSubnetA
      RouteTableId: !Ref DevRouteTable

  DevSubnetBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DevSubnetB
      RouteTableId: !Ref DevRouteTable

  DevelopmentTGWAttachment:
    Type: AWS::EC2::TransitGatewayAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !Ref DevelopmentVPC
      SubnetIds:
        - !Ref DevSubnetA
        - !Ref DevSubnetB
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-dev-tgw-attach"

  # =========================================
  # VPN to On-Premises
  # =========================================
  CustomerGateway:
    Type: AWS::EC2::CustomerGateway
    Properties:
      Type: ipsec.1
      BgpAsn: 65000
      IpAddress: !Ref VPNCustomerGatewayIP
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-cgw"

  VPNConnection:
    Type: AWS::EC2::VPNConnection
    Properties:
      Type: ipsec.1
      CustomerGatewayId: !Ref CustomerGateway
      TransitGatewayId: !Ref TransitGateway
      StaticRoutesOnly: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpn"

  # =========================================
  # VPC Peering (Shared Services <-> Production direct path)
  # =========================================
  SharedProdPeering:
    Type: AWS::EC2::VPCPeeringConnection
    Properties:
      VpcId: !Ref SharedServicesVPC
      PeerVpcId: !Ref ProductionVPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-shared-prod-peering"

  SharedToProdPeeringRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref SharedServicesRouteTable
      DestinationCidrBlock: !Ref ProductionCIDR
      VpcPeeringConnectionId: !Ref SharedProdPeering

  ProdToSharedPeeringRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref ProdRouteTable
      DestinationCidrBlock: !Ref SharedServicesCIDR
      VpcPeeringConnectionId: !Ref SharedProdPeering

  # =========================================
  # Route 53 Private Hosted Zone
  # =========================================
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Sub "${AWS::StackName}.internal"
      VPCs:
        - VPCId: !Ref SharedServicesVPC
          VPCRegion: !Ref AWS::Region
        - VPCId: !Ref ProductionVPC
          VPCRegion: !Ref AWS::Region
        - VPCId: !Ref DevelopmentVPC
          VPCRegion: !Ref AWS::Region
      HostedZoneConfig:
        Comment: Internal DNS for all environments

  SharedServicesDNS:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PrivateHostedZone
      Name: !Sub "shared.${AWS::StackName}.internal"
      Type: A
      TTL: 300
      ResourceRecords:
        - "10.0.1.10"

  # =========================================
  # VPC Flow Logs
  # =========================================
  FlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: "*"

  SharedServicesFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/vpc/flowlogs/${AWS::StackName}-shared"
      RetentionInDays: !Ref FlowLogRetentionDays

  SharedServicesFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref SharedServicesVPC
      ResourceType: VPC
      TrafficType: ALL
      LogGroupName: !Ref SharedServicesFlowLogGroup
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn

  ProductionFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/vpc/flowlogs/${AWS::StackName}-production"
      RetentionInDays: !Ref FlowLogRetentionDays

  ProductionFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref ProductionVPC
      ResourceType: VPC
      TrafficType: ALL
      LogGroupName: !Ref ProductionFlowLogGroup
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn

  # =========================================
  # Network ACLs
  # =========================================
  ProdNetworkACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref ProductionVPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-prod-nacl"

  ProdNACLInboundAllow:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref ProdNetworkACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      CidrBlock: !Ref OrganizationCIDR

  ProdNACLInboundDeny:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref ProdNetworkACL
      RuleNumber: 200
      Protocol: -1
      RuleAction: deny
      CidrBlock: "0.0.0.0/0"

  ProdNACLOutbound:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref ProdNetworkACL
      RuleNumber: 100
      Protocol: -1
      Egress: true
      RuleAction: allow
      CidrBlock: "0.0.0.0/0"

Outputs:
  TransitGatewayId:
    Value: !Ref TransitGateway
    Description: Transit Gateway ID for additional attachments
    Export:
      Name: !Sub "${AWS::StackName}-tgw-id"
  SharedServicesVPCId:
    Value: !Ref SharedServicesVPC
    Export:
      Name: !Sub "${AWS::StackName}-shared-vpc"
  ProductionVPCId:
    Value: !Ref ProductionVPC
    Export:
      Name: !Sub "${AWS::StackName}-prod-vpc"
  DevelopmentVPCId:
    Value: !Ref DevelopmentVPC
    Export:
      Name: !Sub "${AWS::StackName}-dev-vpc"
  VPNConnectionId:
    Value: !Ref VPNConnection
  PrivateHostedZoneId:
    Value: !Ref PrivateHostedZone
