# Instance-shape catalog for rightsizing.
#
# aws_instances — reference AWS EC2 instance specs, used as the source of
#   sizing for shape recommendations and for the AWS side of cost comparison.
#   Costs are approximate on-demand us-east-1 Linux, monthly, USD.
#
# oci_flex_shapes — OCI Flex shape catalog. per_ocpu_cost and per_gb_cost
#   are hourly; rightsizing_engine multiplies by hours_per_month.
#
# oci_fixed_shapes — OCI non-flex shapes (GPU + bare metal). These have
#   fixed SKUs (not per-OCPU billing) so their pricing is a flat per-hour
#   rate.
#
# Consumed by:
#   • app.services.rightsizing_engine
#   • app.services.resource_mapper (for AWS spec lookups)

hours_per_month: 730.0

# AWS families catalogued:
#   t3 / t3a / t4g      — burstable (Intel / AMD / Graviton2)
#   m5 / m6i / m7i      — general purpose (Intel)
#   m5a / m6a / m7a     — general purpose (AMD)
#   m6g / m7g           — general purpose (Graviton2/3)
#   c5 / c6i / c7i      — compute-optimized (Intel)
#   c6a / c7a           — compute-optimized (AMD)
#   c6g / c7g           — compute-optimized (Graviton2/3)
#   r5 / r6i / r7i      — memory-optimized (Intel)
#   r6a / r7a           — memory-optimized (AMD)
#   r6g / r7g           — memory-optimized (Graviton2/3)
#   i3 / i4i            — storage-optimized (NVMe)
#   d3                  — storage-optimized (HDD)
#   x2idn               — high-memory
#   p3 / p4d / p5       — GPU training (V100 / A100 / H100)
#   g4dn / g5 / g6      — GPU inference / graphics (T4 / A10 / L4)

