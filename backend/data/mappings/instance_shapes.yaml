# Family-preferred mapping — rightsizing engine picks an OCI shape by looking up
# the AWS family here before falling back to general-purpose E5. Keys are the
# AWS family prefix (letter+digit+optional letter, e.g. "t4g", "m7i", "r6g").
# Values reference entries in oci_flex_shapes or oci_fixed_shapes.
aws_family_to_oci:
  # Burstable
  t3:   VM.Standard.E5.Flex
  t3a:  VM.Standard.E5.Flex
  t4g:  VM.Standard.A2.Flex
  # General purpose
  m5:   VM.Standard.E5.Flex
  m5a:  VM.Standard.E5.Flex
  m6i:  VM.Standard.E5.Flex
  m6a:  VM.Standard.E5.Flex
  m6g:  VM.Standard.A2.Flex
  m7i:  VM.Standard.E5.Flex
  m7a:  VM.Standard.E5.Flex
  m7g:  VM.Standard.A2.Flex
  # Compute
  c5:   VM.Optimized3.Flex
  c6i:  VM.Optimized3.Flex
  c6a:  VM.Optimized3.Flex
  c6g:  VM.Standard.A2.Flex
  c7i:  VM.Optimized3.Flex
  c7a:  VM.Optimized3.Flex
  c7g:  VM.Standard.A2.Flex
  # Memory
  r5:   VM.Standard.E5.Flex
  r6i:  VM.Standard.E5.Flex
  r6a:  VM.Standard.E5.Flex
  r6g:  VM.Standard.A2.Flex
  r7i:  VM.Standard.E5.Flex
  r7a:  VM.Standard.E5.Flex
  r7g:  VM.Standard.A2.Flex
  x2idn: VM.Standard.E5.Flex
  # Storage (NVMe-local)
  i3:   VM.DenseIO.E5.Flex
  i4i:  VM.DenseIO.E5.Flex
  d3:   VM.DenseIO.E5.Flex
  # GPU (maps to fixed OCI shape — rightsizer picks by gpu_count+type)
  p3:   BM.GPU.A100-v2.8
  p4d:  BM.GPU.A100-v2.8
  p5:   BM.GPU.H100.8
  g4dn: VM.GPU.A10.1
  g5:   VM.GPU.A10.1
  g6:   VM.GPU.A10.1
