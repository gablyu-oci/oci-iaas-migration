# AWS → OCI resource mapping — single source of truth.
#
# Consumed by:
#   • app.services.resource_mapper         (deterministic per-resource mapping)
#   • app.services.rightsizing_engine      (sanity checks on recommended shape)
#   • skill orchestrators                  (table injected into LLM prompts)
#
# Field contract (all fields required unless marked optional):
#   aws_type              AWS CloudFormation type string, e.g. "AWS::EC2::Instance".
#   oci_service           Human-friendly OCI service name. Used in UI + LLM prompt.
#   oci_terraform         Terraform resource name (hashicorp/oci provider).
#   skill                 Which skill translates this type. One of:
#                         network_translation, ec2_translation, storage_translation,
#                         database_translation, loadbalancer_translation,
#                         iam_translation, security_translation, serverless_translation,
#                         observability_translation, cfn_terraform, synthesis,
#                         workload_planning, data_migration_planning.
#   mapping_confidence    high | medium | low — deterministic confidence before LLM review.
#   notes          (opt)  Free-form guidance visible to LLM + UI.
#   gaps           (opt)  Known feature gaps that require manual intervention.

resources:
  # ── Networking ────────────────────────────────────────────────────────────
  - aws_type: AWS::EC2::VPC
    oci_service: Networking
    oci_resource_label: OCI VCN
    oci_terraform: oci_core_vcn
    skill: network_translation
    mapping_confidence: high
    notes:
      - OCI VCN is regional (spans all ADs); AWS VPCs are regional too but subnets are AZ-pinned.

  - aws_type: AWS::EC2::Subnet
    oci_service: Networking
    oci_resource_label: OCI Subnet
    oci_terraform: oci_core_subnet
    skill: network_translation
    mapping_confidence: high
    notes:
      - OCI subnets are regional by default; use availability_domain to pin if strictly needed.

  - aws_type: AWS::EC2::SecurityGroup
    oci_service: Networking
    oci_resource_label: OCI Network Security Group
    oci_terraform: oci_core_network_security_group
    skill: network_translation
    mapping_confidence: high
    notes:
      - OCI NSGs (preferred) or Security Lists — NSGs attach to VNICs, SLs attach to subnets.

  - aws_type: AWS::EC2::NetworkInterface
    oci_service: Networking
    oci_resource_label: OCI VNIC Attachment
    oci_terraform: oci_core_vnic_attachment
    skill: network_translation
    mapping_confidence: high

  - aws_type: AWS::EC2::InternetGateway
    oci_service: Networking
    oci_resource_label: OCI Internet Gateway
    oci_terraform: oci_core_internet_gateway
    skill: network_translation
    mapping_confidence: high

  - aws_type: AWS::EC2::NatGateway
    oci_service: Networking
    oci_resource_label: OCI NAT Gateway
    oci_terraform: oci_core_nat_gateway
    skill: network_translation
    mapping_confidence: high

  - aws_type: AWS::EC2::RouteTable
    oci_service: Networking
    oci_resource_label: OCI Route Table
    oci_terraform: oci_core_route_table
    skill: network_translation
    mapping_confidence: high

  - aws_type: AWS::EC2::EIP
    oci_service: Networking
    oci_resource_label: OCI Reserved Public IP
    oci_terraform: oci_core_public_ip
    skill: network_translation
    mapping_confidence: high
    notes:
      - OCI Reserved Public IPs are regional; set lifetime = "RESERVED" to match EIP semantics.

  - aws_type: AWS::EC2::NetworkAcl
    oci_service: Networking
    oci_resource_label: OCI Security List
    oci_terraform: oci_core_security_list
    skill: network_translation
    mapping_confidence: medium
    notes:
      - AWS NACLs are stateless subnet-level rules; the closest OCI equivalent is a Security List
        (also attached at the subnet level). Prefer NSGs where possible.

  - aws_type: AWS::EC2::VPCPeeringConnection
    oci_service: Networking
    oci_resource_label: OCI Local/Remote Peering
    oci_terraform: oci_core_local_peering_gateway
    skill: network_translation
    mapping_confidence: medium
    notes:
      - Same-region peering → Local Peering Gateway (LPG) pair, one per VCN.
      - Cross-region peering → Remote Peering Connection (RPC) + DRG in each region.
    gaps:
      - Cross-account peering accept/reject flow is manual in OCI (tenancy-level trust required).

  - aws_type: AWS::EC2::TransitGateway
    oci_service: Networking
    oci_resource_label: OCI Dynamic Routing Gateway
    oci_terraform: oci_core_drg
    skill: network_translation
    mapping_confidence: high
    notes:
      - AWS TGW → OCI DRG with multiple VCN attachments. DRG is the hub for VCN-to-VCN,
        VCN-to-on-premise (IPSec / FastConnect), and cross-region traffic.

  - aws_type: AWS::EC2::TransitGatewayAttachment
    oci_service: Networking
    oci_resource_label: OCI DRG Attachment
    oci_terraform: oci_core_drg_attachment
    skill: network_translation
    mapping_confidence: high

  - aws_type: AWS::EC2::TransitGatewayRouteTable
    oci_service: Networking
    oci_resource_label: OCI DRG Route Table
    oci_terraform: oci_core_drg_route_table
    skill: network_translation
    mapping_confidence: high

  - aws_type: AWS::EC2::VPCEndpoint
    oci_service: Networking
    oci_resource_label: OCI Service Gateway / Private Endpoint
    oci_terraform: oci_core_service_gateway
    skill: network_translation
    mapping_confidence: medium
    notes:
      - Gateway endpoints (S3, DynamoDB) → OCI Service Gateway (to OCI Object Storage / etc).
      - Interface endpoints (PrivateLink to AWS services) → OCI Private Endpoint
        (oci_core_private_endpoint) when targeting OCI services via private VCN.
    gaps:
      - Third-party PrivateLink partners don't have a 1:1 OCI equivalent.

  - aws_type: AWS::EC2::VPNConnection
    oci_service: Networking
    oci_resource_label: OCI IPSec Connection
    oci_terraform: oci_core_ipsec
    skill: network_translation
    mapping_confidence: high
    notes:
      - OCI IPSec runs two redundant tunnels per connection; PSK or BGP supported.

  - aws_type: AWS::EC2::VPNGateway
    oci_service: Networking
    oci_resource_label: OCI DRG (IPSec-capable)
    oci_terraform: oci_core_drg
    skill: network_translation
    mapping_confidence: medium
    notes:
      - AWS separates VPN Gateway from TGW; OCI unifies both into DRG.

  - aws_type: AWS::EC2::CustomerGateway
    oci_service: Networking
    oci_resource_label: OCI Customer-Premises Equipment
    oci_terraform: oci_core_cpe
    skill: network_translation
    mapping_confidence: high

  - aws_type: AWS::DirectConnect::Connection
    oci_service: FastConnect
    oci_resource_label: OCI FastConnect Virtual Circuit
    oci_terraform: oci_core_virtual_circuit
    skill: network_translation
    mapping_confidence: medium
    notes:
      - AWS DX → OCI FastConnect. Both are private optical circuits from partner/colo to cloud.
    gaps:
      - Partner availability and port speeds differ — validate region + partner feasibility first.

  # ── Compute ───────────────────────────────────────────────────────────────
  - aws_type: AWS::EC2::Instance
    oci_service: Compute
    oci_terraform: oci_core_instance
    skill: ec2_translation
    mapping_confidence: high
    notes:
      - Shape chosen via rightsizing_engine. See instance_shapes.yaml for the catalog.

  - aws_type: AWS::EC2::LaunchTemplate
    oci_service: Compute
    oci_terraform: oci_core_instance_configuration
    skill: ec2_translation
    mapping_confidence: high

  - aws_type: AWS::AutoScaling::AutoScalingGroup
    oci_service: Compute
    oci_terraform: oci_core_instance_pool
    skill: ec2_translation
    mapping_confidence: high
    notes:
      - AWS ASG → OCI Instance Pool + Instance Configuration combo.

  - aws_type: AWS::AutoScaling::LaunchConfiguration
    oci_service: Compute
    oci_terraform: oci_core_instance_configuration
    skill: ec2_translation
    mapping_confidence: high

  - aws_type: AWS::EC2::Image
    oci_service: Compute
    oci_resource_label: OCI Custom Image
    oci_terraform: oci_core_image
    skill: ec2_translation
    mapping_confidence: medium
    notes:
      - AMI → OCI custom image via export to Object Storage + import as OCI image.
    gaps:
      - Windows AMIs may need licence mobility review; NVMe drivers pre-installed in OL only.

  - aws_type: AWS::EC2::KeyPair
    oci_service: Compute
    oci_resource_label: N/A (ssh_authorized_keys inline)
    oci_terraform: null
    skill: ec2_translation
    mapping_confidence: high
    notes:
      - OCI has no managed key-pair object — instances take `ssh_authorized_keys` inline in metadata.

  - aws_type: AWS::EC2::SpotFleet
    oci_service: Compute
    oci_resource_label: OCI Preemptible Instance Pool
    oci_terraform: oci_core_instance_pool
    skill: ec2_translation
    mapping_confidence: medium
    notes:
      - Use oci_core_instance_configuration.instance_details.preemptible_instance_config
        to get spot-like behaviour.
    gaps:
      - No bid-price concept in OCI preemptibles — they're a fixed 50% discount.

  # ── Storage ───────────────────────────────────────────────────────────────
  - aws_type: AWS::EC2::Volume
    oci_service: Block Volume
    oci_terraform: oci_core_volume
    skill: storage_translation
    mapping_confidence: high
    notes:
      - OCI encrypts all block volumes by default.
      - vpus_per_gb drives perf tier — see storage.ebs_to_block_volume below.

  - aws_type: AWS::EC2::VolumeAttachment
    oci_service: Block Volume
    oci_terraform: oci_core_volume_attachment
    skill: storage_translation
    mapping_confidence: high
    notes:
      - Default attachment type is paravirtualized (standard for VM shapes).

  - aws_type: AWS::EC2::Snapshot
    oci_service: Block Volume
    oci_resource_label: OCI Block Volume Backup
    oci_terraform: oci_core_volume_backup
    skill: storage_translation
    mapping_confidence: high
    notes:
      - AWS EBS snapshot → OCI Block Volume Backup. Use backup policies (oci_core_volume_backup_policy)
        for lifecycle parity with AWS EBS DLM.

  - aws_type: AWS::S3::Bucket
    oci_service: Object Storage
    oci_terraform: oci_objectstorage_bucket
    skill: storage_translation
    mapping_confidence: high

  - aws_type: AWS::S3::BucketPolicy
    oci_service: Object Storage
    oci_resource_label: IAM policy on tenancy/compartment
    oci_terraform: oci_identity_policy
    skill: storage_translation
    mapping_confidence: medium
    notes:
      - OCI buckets don't carry an inline resource policy — authorize via IAM policy
        targeting the bucket's compartment + dynamic-group conditions.

  - aws_type: AWS::EFS::FileSystem
    oci_service: File Storage
    oci_resource_label: OCI File Storage File System
    oci_terraform: oci_file_storage_file_system
    skill: storage_translation
    mapping_confidence: high
    notes:
      - EFS → OCI File Storage Service (FSS). NFSv3 semantics. Mount targets are AD-scoped.

  - aws_type: AWS::EFS::MountTarget
    oci_service: File Storage
    oci_resource_label: OCI FSS Mount Target
    oci_terraform: oci_file_storage_mount_target
    skill: storage_translation
    mapping_confidence: high
    notes:
      - One OCI mount target per AD per subnet; reuse across file systems via exports.

  - aws_type: AWS::EFS::AccessPoint
    oci_service: File Storage
    oci_resource_label: OCI FSS Export
    oci_terraform: oci_file_storage_export
    skill: storage_translation
    mapping_confidence: medium
    notes:
      - Maps to an FSS export with its own export options (path, squash, access rules).

  - aws_type: AWS::FSx::FileSystem
    oci_service: File Storage / Compute
    oci_terraform: oci_file_storage_file_system
    skill: storage_translation
    mapping_confidence: low
    gaps:
      - FSx for Windows / Lustre / NetApp ONTAP have no drop-in OCI equivalent; may need
        self-managed fileserver on Compute or OCI's Lustre partner offering.

  # ── Database — RDS engines ────────────────────────────────────────────────
  - aws_type: AWS::RDS::DBInstance
    oci_service: Database
    oci_terraform: oci_database_db_system
    skill: database_translation
    mapping_confidence: high
    notes:
      - Engine-specific target — see database.rds_engine below.
      - Consider Autonomous Database for greenfield Postgres/Oracle workloads.

  - aws_type: AWS::RDS::DBCluster
    oci_service: Database
    oci_terraform: oci_database_db_system
    skill: database_translation
    mapping_confidence: medium
    notes:
      - Aurora → OCI Autonomous (postgres/oracle) or MySQL HeatWave (mysql).

  - aws_type: AWS::RDS::DBSubnetGroup
    oci_service: Database
    oci_resource_label: OCI subnet reference
    oci_terraform: null
    skill: database_translation
    mapping_confidence: high
    notes:
      - OCI DB systems attach directly to a subnet; no separate "subnet group" object.

  - aws_type: AWS::RDS::DBParameterGroup
    oci_service: Database
    oci_resource_label: OCI DB config
    oci_terraform: oci_database_db_home
    skill: database_translation
    mapping_confidence: medium
    notes:
      - Engine-specific DB parameters are set per DB home / pluggable DB in OCI.

  # ── Database — cache / NoSQL / analytics ──────────────────────────────────
  - aws_type: AWS::DynamoDB::Table
    oci_service: NoSQL Database
    oci_terraform: oci_nosql_table
    skill: database_translation
    mapping_confidence: medium
    gaps:
      - Query patterns differ — global secondary indexes map but validate access patterns.

  - aws_type: AWS::ElastiCache::CacheCluster
    oci_service: OCI Cache with Redis
    oci_terraform: oci_redis_redis_cluster
    skill: database_translation
    mapping_confidence: medium
    notes:
      - Redis engine → OCI Cache (managed Redis). Memcached → self-host on Compute today.
    gaps:
      - Memcached has no managed OCI equivalent — requires self-hosted fallback.

  - aws_type: AWS::ElastiCache::ReplicationGroup
    oci_service: OCI Cache with Redis
    oci_terraform: oci_redis_redis_cluster
    skill: database_translation
    mapping_confidence: medium
    notes:
      - Primary + replica topology → OCI Redis cluster with node_count > 1.

  - aws_type: AWS::DocDB::DBCluster
    oci_service: Autonomous JSON / self-managed MongoDB
    oci_terraform: oci_database_autonomous_database
    skill: database_translation
    mapping_confidence: low
    gaps:
      - DocumentDB is MongoDB-API compatible; closest OCI targets are Autonomous JSON
        (for JSON docs) or self-hosted MongoDB on Compute. No drop-in managed Mongo.

  - aws_type: AWS::Neptune::DBCluster
    oci_service: OCI Graph Studio / self-managed
    oci_terraform: null
    skill: database_translation
    mapping_confidence: low
    gaps:
      - No managed property-graph DB on OCI. Evaluate Oracle Graph (on Autonomous DB)
        or self-hosted Neo4j/TinkerPop on Compute.

  - aws_type: AWS::OpenSearchService::Domain
    oci_service: OCI Search with OpenSearch
    oci_terraform: oci_opensearch_opensearch_cluster
    skill: database_translation
    mapping_confidence: high
    notes:
      - OCI Search with OpenSearch is wire-compatible with OpenSearch 2.x.
    gaps:
      - Elasticsearch 7.x clients may need version bumps; fine-grained access control differs.

  - aws_type: AWS::Redshift::Cluster
    oci_service: Autonomous Data Warehouse
    oci_terraform: oci_database_autonomous_database
    skill: database_translation
    mapping_confidence: medium
    notes:
      - Redshift → OCI ADW (set db_workload = "DW"). Migration typically needs SQL-dialect rewrite.
    gaps:
      - Redshift Spectrum (external tables on S3) maps to ADW external-table on Object Storage.

  - aws_type: AWS::DAX::Cluster
    oci_service: OCI Cache with Redis
    oci_terraform: oci_redis_redis_cluster
    skill: database_translation
    mapping_confidence: low
    notes:
      - DAX is DynamoDB accelerator — in OCI pair NoSQL table with Redis cache in front.

  - aws_type: AWS::MSK::Cluster
    oci_service: Streaming
    oci_terraform: oci_streaming_stream_pool
    skill: database_translation
    mapping_confidence: medium
    notes:
      - MSK (Kafka) → OCI Streaming (Kafka-API compatible via Stream Pools).
    gaps:
      - MSK Connect / schema registry not 1:1 in OCI Streaming.

  - aws_type: AWS::Timestream::Database
    oci_service: Autonomous DB with TimeSeries
    oci_terraform: null
    skill: database_translation
    mapping_confidence: low
    gaps:
      - No dedicated time-series managed service; use Autonomous DB with partitioning or self-host InfluxDB.

  # ── Load balancing ────────────────────────────────────────────────────────
  - aws_type: AWS::ElasticLoadBalancingV2::LoadBalancer
    oci_service: Load Balancer
    oci_terraform: oci_load_balancer_load_balancer
    skill: loadbalancer_translation
    mapping_confidence: high
    notes:
      - ALB → OCI LB with routing rules; NLB → OCI Network Load Balancer.
    gaps:
      - SSL certificates must be imported to OCI Certificate Service.

  - aws_type: AWS::ElasticLoadBalancingV2::TargetGroup
    oci_service: Load Balancer
    oci_resource_label: OCI Backend Set
    oci_terraform: oci_load_balancer_backend_set
    skill: loadbalancer_translation
    mapping_confidence: high
    notes:
      - One AWS target group == one OCI backend set. health_check maps to health_checker.
      - For NLB, use oci_network_load_balancer_backend_set instead.

  - aws_type: AWS::ElasticLoadBalancingV2::Listener
    oci_service: Load Balancer
    oci_resource_label: OCI LB Listener
    oci_terraform: oci_load_balancer_listener
    skill: loadbalancer_translation
    mapping_confidence: high
    notes:
      - HTTP/HTTPS for ALB, TCP/TCP_UDP for NLB. HTTPS requires a cert OCID in OCI.
    gaps:
      - HTTPS listeners need certificate_ids (OCID) — import cert to OCI Certificate Service first.

  - aws_type: AWS::ElasticLoadBalancing::LoadBalancer
    oci_service: Load Balancer
    oci_resource_label: OCI Load Balancer (classic-equivalent)
    oci_terraform: oci_load_balancer_load_balancer
    skill: loadbalancer_translation
    mapping_confidence: medium
    notes:
      - Classic ELB v1 → OCI LB. Rebuild listeners + backend sets; no direct Classic-mode parity.

  # ── IAM ───────────────────────────────────────────────────────────────────
  - aws_type: AWS::IAM::Role
    oci_service: IAM
    oci_terraform: oci_identity_dynamic_group
    skill: iam_translation
    mapping_confidence: medium
    notes:
      - Use dynamic groups for service roles (OCI has no direct "role" concept).
    gaps:
      - Cross-account trust policies → OCI tenancy federation (no 1:1 mapping).

  - aws_type: AWS::IAM::Policy
    oci_service: IAM
    oci_terraform: oci_identity_policy
    skill: iam_translation
    mapping_confidence: medium
    notes:
      - OCI uses verb-based policy model (inspect/read/use/manage).
      - See iam.yaml for the full action → verb table.

  - aws_type: AWS::IAM::User
    oci_service: IAM
    oci_terraform: oci_identity_user
    skill: iam_translation
    mapping_confidence: high
    notes:
      - Prefer IDCS / federated identities over local IAM users in production.

  - aws_type: AWS::IAM::Group
    oci_service: IAM
    oci_terraform: oci_identity_group
    skill: iam_translation
    mapping_confidence: high

  - aws_type: AWS::IAM::InstanceProfile
    oci_service: IAM
    oci_resource_label: OCI Dynamic Group
    oci_terraform: oci_identity_dynamic_group
    skill: iam_translation
    mapping_confidence: medium
    notes:
      - Instance profiles → dynamic groups whose matching rule targets the instance OCID
        (e.g., `instance.compartment.id = '...'`).

  - aws_type: AWS::IAM::AccessKey
    oci_service: IAM
    oci_terraform: oci_identity_auth_token
    skill: iam_translation
    mapping_confidence: medium
    notes:
      - OCI uses API keys (public/private pair) or auth tokens — no long-lived access keys.

  # ── Security / secrets / crypto ───────────────────────────────────────────
  - aws_type: AWS::KMS::Key
    oci_service: Vault (KMS)
    oci_terraform: oci_kms_key
    skill: security_translation
    mapping_confidence: high
    notes:
      - OCI KMS keys live inside a Vault. Provision vault + keys separately in TF.
    gaps:
      - KMS key policies (resource-based) map to OCI IAM policies on compartments.
      - Asymmetric keys supported on OCI but algorithm set differs — validate.

  - aws_type: AWS::KMS::Alias
    oci_service: Vault (KMS)
    oci_resource_label: OCI Key (with display_name)
    oci_terraform: oci_kms_key
    skill: security_translation
    mapping_confidence: high
    notes:
      - OCI keys are referenced by OCID + display_name; no separate alias object.

  - aws_type: AWS::SecretsManager::Secret
    oci_service: Vault Secret
    oci_terraform: oci_vault_secret
    skill: security_translation
    mapping_confidence: high
    notes:
      - Secrets live under a Vault + KMS master key. Rotation hooks differ — OCI uses
        secret versions + (optional) external rotation functions.

  - aws_type: AWS::SecretsManager::RotationSchedule
    oci_service: Vault Secret
    oci_resource_label: OCI Secret rotation config
    oci_terraform: oci_vault_secret
    skill: security_translation
    mapping_confidence: low
    gaps:
      - AWS uses Lambda rotation; OCI rotation is manual or via Functions — port logic explicitly.

  - aws_type: AWS::SSM::Parameter
    oci_service: Vault Secret / App Config
    oci_terraform: oci_vault_secret
    skill: security_translation
    mapping_confidence: medium
    notes:
      - SecureString → Vault Secret.
      - String / StringList → OCI Application Configuration (or Vault secret if sensitive).

  - aws_type: AWS::CertificateManager::Certificate
    oci_service: Certificates
    oci_terraform: oci_certificates_management_certificate
    skill: security_translation
    mapping_confidence: high
    notes:
      - OCI Certificate Service can issue from its internal CA or import your PEM.
    gaps:
      - ACM public-CA auto-renewal via DNS validation is manual in OCI for external CAs.

  - aws_type: AWS::WAFv2::WebACL
    oci_service: Web Application Firewall
    oci_terraform: oci_waf_web_app_firewall
    skill: security_translation
    mapping_confidence: medium
    notes:
      - AWS managed rule groups → OCI WAF protection capabilities (OWASP CRS equivalents).
    gaps:
      - Custom CAPTCHA / bot control rules need manual review.

  - aws_type: AWS::WAFv2::IPSet
    oci_service: Web Application Firewall
    oci_resource_label: OCI WAF Network Address List
    oci_terraform: oci_waf_network_address_list
    skill: security_translation
    mapping_confidence: high

  # ── Serverless / containers / API ─────────────────────────────────────────
  - aws_type: AWS::Lambda::Function
    oci_service: Functions
    oci_terraform: oci_functions_function
    skill: serverless_translation
    mapping_confidence: medium
    notes:
      - Requires OCI Functions application (Fn Project runtime).
      - Code may need changes for SDK/API calls.
    gaps:
      - Lambda layers not supported in OCI Functions.
      - Event source mappings need manual reconfiguration.

  - aws_type: AWS::Lambda::LayerVersion
    oci_service: Functions
    oci_resource_label: Baked into container image
    oci_terraform: null
    skill: serverless_translation
    mapping_confidence: low
    gaps:
      - No "layer" concept in OCI Functions — bundle into the function's container image.

  - aws_type: AWS::Lambda::EventSourceMapping
    oci_service: Connector Hub / Events / Streams
    oci_terraform: oci_sch_service_connector
    skill: serverless_translation
    mapping_confidence: low
    notes:
      - Stream → Function, Queue → Function etc., via OCI Service Connector Hub.

  - aws_type: AWS::ApiGateway::RestApi
    oci_service: API Gateway
    oci_terraform: oci_apigateway_deployment
    skill: serverless_translation
    mapping_confidence: medium
    notes:
      - v1 REST API → OCI API Gateway deployment + routes. Routes call Functions or backend URLs.
    gaps:
      - VPC link / Lambda authorizers need rewriting as OCI auth functions.

  - aws_type: AWS::ApiGatewayV2::Api
    oci_service: API Gateway
    oci_terraform: oci_apigateway_deployment
    skill: serverless_translation
    mapping_confidence: medium
    notes:
      - HTTP APIs map cleanly. WebSocket APIs are not natively supported — use OCI Streaming.

  - aws_type: AWS::ApiGateway::Stage
    oci_service: API Gateway
    oci_resource_label: OCI API Gateway deployment path_prefix
    oci_terraform: oci_apigateway_deployment
    skill: serverless_translation
    mapping_confidence: medium

  - aws_type: AWS::StepFunctions::StateMachine
    oci_service: Resource Manager / Functions orchestration
    oci_terraform: null
    skill: serverless_translation
    mapping_confidence: low
    gaps:
      - "No drop-in Step Functions equivalent. Options: orchestrate via OCI Functions +
         Events, or move to OCI Data Integration for data pipelines, or keep state machine
         code and port to a self-hosted orchestrator (Temporal, Airflow)."

  - aws_type: AWS::Events::Rule
    oci_service: Events Service
    oci_terraform: oci_events_rule
    skill: serverless_translation
    mapping_confidence: high
    notes:
      - EventBridge rule → OCI Events rule. Condition syntax is JSON-schema; action targets
        are Functions / Streaming / Notifications.

  - aws_type: AWS::Events::EventBus
    oci_service: Events Service
    oci_resource_label: Default Events stream
    oci_terraform: null
    skill: serverless_translation
    mapping_confidence: medium
    notes:
      - OCI Events runs off a single per-tenancy event stream — no custom-bus concept.

  - aws_type: AWS::Kinesis::Stream
    oci_service: Streaming
    oci_terraform: oci_streaming_stream
    skill: serverless_translation
    mapping_confidence: high
    notes:
      - Kinesis shard → OCI Streaming partition (Kafka protocol).

  - aws_type: AWS::KinesisFirehose::DeliveryStream
    oci_service: Service Connector Hub
    oci_terraform: oci_sch_service_connector
    skill: serverless_translation
    mapping_confidence: medium
    notes:
      - Firehose → Service Connector Hub (source → target rules with optional Functions transform).

  - aws_type: AWS::ECS::Service
    oci_service: Container Instances
    oci_terraform: oci_container_instances_container_instance
    skill: serverless_translation
    mapping_confidence: medium
    notes:
      - For simple services; use OKE for complex.

  - aws_type: AWS::ECS::TaskDefinition
    oci_service: Container Instances
    oci_terraform: oci_container_instances_container_instance
    skill: serverless_translation
    mapping_confidence: medium
    notes:
      - Task definitions map to OCI container instance spec (containers list + volumes).

  - aws_type: AWS::ECS::Cluster
    oci_service: Container Instances / OKE
    oci_terraform: null
    skill: serverless_translation
    mapping_confidence: medium
    notes:
      - No separate cluster object in OCI Container Instances; for orchestration use OKE.

  - aws_type: AWS::EKS::Cluster
    oci_service: Container Engine (OKE)
    oci_terraform: oci_containerengine_cluster
    skill: serverless_translation
    mapping_confidence: high

  - aws_type: AWS::EKS::Nodegroup
    oci_service: Container Engine (OKE)
    oci_resource_label: OKE Node Pool
    oci_terraform: oci_containerengine_node_pool
    skill: serverless_translation
    mapping_confidence: high

  - aws_type: AWS::ECR::Repository
    oci_service: Container Registry (OCIR)
    oci_terraform: oci_artifacts_container_repository
    skill: serverless_translation
    mapping_confidence: high
    notes:
      - OCIR auth uses auth tokens; rewrite docker login commands accordingly.

  # ── Observability / messaging ─────────────────────────────────────────────
  - aws_type: AWS::CloudWatch::Alarm
    oci_service: Monitoring
    oci_terraform: oci_monitoring_alarm
    skill: observability_translation
    mapping_confidence: medium
    notes:
      - Map metric namespaces to OCI equivalents (e.g., AWS/EC2 → oci_computeagent).

  - aws_type: AWS::CloudWatch::Dashboard
    oci_service: Management Dashboards
    oci_terraform: oci_management_dashboard_management_dashboard
    skill: observability_translation
    mapping_confidence: medium
    gaps:
      - Widget types differ; usually easier to rebuild dashboards than to translate JSON.

  - aws_type: AWS::Logs::LogGroup
    oci_service: Logging
    oci_terraform: oci_logging_log_group
    skill: observability_translation
    mapping_confidence: high
    notes:
      - Each AWS log group → OCI Log Group + one or more Logs inside it.

  - aws_type: AWS::Logs::LogStream
    oci_service: Logging
    oci_terraform: oci_logging_log
    skill: observability_translation
    mapping_confidence: high

  - aws_type: AWS::Logs::SubscriptionFilter
    oci_service: Service Connector Hub
    oci_terraform: oci_sch_service_connector
    skill: observability_translation
    mapping_confidence: medium
    notes:
      - Log → Stream / Function subscription becomes a Service Connector.

  - aws_type: AWS::SNS::Topic
    oci_service: Notifications
    oci_terraform: oci_ons_notification_topic
    skill: observability_translation
    mapping_confidence: high

  - aws_type: AWS::SNS::Subscription
    oci_service: Notifications
    oci_terraform: oci_ons_subscription
    skill: observability_translation
    mapping_confidence: high
    notes:
      - "Protocols supported: EMAIL, HTTPS, PAGERDUTY, SLACK, ORACLE_FUNCTIONS, SMS."

  - aws_type: AWS::SQS::Queue
    oci_service: Queue
    oci_terraform: oci_queue_queue
    skill: observability_translation
    mapping_confidence: high

  - aws_type: AWS::SQS::QueuePolicy
    oci_service: Queue
    oci_resource_label: IAM policy on queue compartment
    oci_terraform: oci_identity_policy
    skill: observability_translation
    mapping_confidence: medium

  - aws_type: AWS::CloudTrail::Trail
    oci_service: Audit
    oci_resource_label: Auto-enabled tenancy audit log
    oci_terraform: null
    skill: observability_translation
    mapping_confidence: high
    notes:
      - OCI Audit is on by default for every tenancy; no resource to provision. Configure
        retention + log forwarding via Service Connector to Object Storage / Streaming.

  # ── CDN / DNS ─────────────────────────────────────────────────────────────
  - aws_type: AWS::CloudFront::Distribution
    oci_service: Web Application Acceleration
    oci_terraform: oci_waa_web_app_acceleration
